# Example Cloud Build config for running the league_scores pipeline from a trigger.
# Copy to cloudbuild.yaml and customize values as needed.
steps:
  - name: python:3.11
    id: run-league-pipeline
    entrypoint: bash
    env:
      - DB_CONFIG_GCS_URI=${_DB_CONFIG_GCS_URI}
      - PYTHONUNBUFFERED=1
    args:
      - -c
      - |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python main.py

substitutions:
  _DB_CONFIG_GCS_URI: gs://your-gcs-bucket/config/db_config.txt

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
